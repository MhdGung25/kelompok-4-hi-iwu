<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link id="favicon" rel="icon" type="image/png" href="/images/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kelompok-4</title>

    <script>
      window.addEventListener('DOMContentLoaded', () => {
        const img = new Image();
        img.src = '/images/logo.png'; // Jalur file logo kamu
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          
          // Tentukan ukuran canvas (persegi simetris)
          const size = Math.min(img.width, img.height);
          canvas.width = size;
          canvas.height = size;
          
          // Membuat masker berbentuk lingkaran
          ctx.beginPath();
          ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
          ctx.clip();
          
          // Gambar logo di dalam masker lingkaran
          ctx.drawImage(img, (size - img.width) / 2, (size - img.height) / 2);
          
          // Ganti href favicon lama dengan hasil gambar lingkaran baru
          document.getElementById('favicon').href = canvas.toDataURL('image/png');
        };
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
